<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Diary 版型｜好家來</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    body{margin:0;font-family:Inter,sans-serif;background:#f7f6f2;color:#28251d;padding:60px 24px}
    main{max-width:980px;margin:0 auto}
    h1{font-family:'Noto Serif TC',serif;font-size:36px;margin:0 0 8px}
    .sub{color:#7a756a;margin:0 0 32px}
    code{background:#e8e3d7;padding:2px 8px;border-radius:6px;font-size:14px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
    .card{display:block;text-decoration:none;color:inherit;background:#fbfbf9;border:1px solid #d6d1c9;border-radius:16px;padding:24px;transition:transform .15s}
    .card.current{border-color:#01696f;border-width:2px}
    .card:hover{transform:translateY(-4px)}
    .tag{display:inline-block;background:#01696f;color:#fff;padding:4px 12px;border-radius:999px;font-size:13px;margin-bottom:12px}
    .card h2{font-family:'Noto Serif TC',serif;font-size:22px;margin:0 0 6px}
    .card p{margin:0;color:#5a554d;font-size:14px}
  </style>
</head>
<body class="picker">

    <main>
      <h1>Diary 三版本</h1>
      <p class="sub">主版 = <code>/diary/</code> 手帳風。其他是備份對照。</p>
      <div class="grid">
        <a class="card current" href="/diary/"><div class="tag">⭐ 目前主版</div><h2>手帳風</h2><p>米色時間軸 · 雙欄</p></a>
        <a class="card" href="/diary-minimal/"><div class="tag">備份</div><h2>極簡</h2><p>白底大字 · 單欄</p></a>
        <a class="card" href="/diary-grid/"><div class="tag">備份</div><h2>網格</h2><p>深色卡片 · 多欄</p></a>
      </div>
    </main>
  
</body>
</html>
